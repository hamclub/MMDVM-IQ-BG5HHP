[General]
Daemon=0

[Log]
# Logging levels, 0=No logging
FileLevel=1
FilePath=/tmp
FileRoot=MMDVM-IQ
DisplayLevel=1
MQTTLevel=1

[MQTT]
Host=127.0.0.1
Port=1883
Auth=0
Username=mmdvm
Password=mmdvm
Keepalive=60
Name=modem

[Modem]
# For the SXceiver
Type=sx
RxGain=50
TxGain=30
# For the Pluto SDR
# Type=plutosdr
# RxGain=30
# TxGain=89
# URI=ip:pluto.local        # Soapy URI, use usb:1.1.5 for plutosdr
# For the Lime SDR
# Type=limesdr
# RxGain=30
# TxGain=60
# Type=limemini             # or limenet-micro for the LimeNET-micro v1
# RxGain=30
# TxGain=64
# URI="serial=xxxx"
Trace=0

[MMDVM Host]
HostAddress=127.0.0.1
HostPort=3335
LocalAddress=127.0.0.1
LocalPort=3334
Trace=0
